<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#FFF0F5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F0F4FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="nameGradLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="35%" style="stop-color:#B8860B"/>
      <stop offset="70%" style="stop-color:#0077B5"/>
      <stop offset="100%" style="stop-color:#4B0082"/>
    </linearGradient>
    <filter id="glowL">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bannerClipL"><rect width="900" height="280" rx="16"/></clipPath>
  </defs>
  <g clip-path="url(#bannerClipL)">
    <rect width="900" height="280" fill="url(#bgLight)"/>
    <pattern id="dotsL" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#8A2BE2" opacity="0.1"/>
    </pattern>
    <rect width="900" height="280" fill="url(#dotsL)"/>
    <circle cx="100" cy="80" r="60" fill="#FF6F61" opacity="0.08"/>
    <circle cx="800" cy="180" r="80" fill="#8A2BE2" opacity="0.06"/>
    <!-- Top stripe -->
    <rect x="0" y="0" width="128" height="5" fill="#FF6F61"/>
    <rect x="128" y="0" width="129" height="5" fill="#FFD700"/>
    <rect x="257" y="0" width="129" height="5" fill="#00b359"/>
    <rect x="386" y="0" width="129" height="5" fill="#0099CC"/>
    <rect x="515" y="0" width="129" height="5" fill="#FF4081"/>
    <rect x="644" y="0" width="128" height="5" fill="#8A2BE2"/>
    <rect x="772" y="0" width="128" height="5" fill="#FF6F61"/>
    <!-- Status -->
    <rect x="32" y="22" width="160" height="26" rx="13" fill="none" stroke="#00b359" stroke-width="1.5"/>
    <circle cx="50" cy="35" r="5" fill="#00b359">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="62" y="40" font-family="'Courier New',monospace" font-size="11" fill="#00b359" font-weight="600">Open to Work</text>
    <!-- Name -->
    <text x="450" y="115" text-anchor="middle" font-family="'Arial Black','Arial',sans-serif"
      font-size="68" font-weight="900" fill="url(#nameGradLight)" filter="url(#glowL)"
      letter-spacing="4">AQSA RASHEED</text>
    <line x1="120" y1="128" x2="780" y2="128" stroke="url(#nameGradLight)" stroke-width="3" opacity="0.4">
      <animate attributeName="x1" values="450;120;450" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="450;780;450" dur="3s" repeatCount="indefinite"/>
    </line>
    <text x="450" y="165" text-anchor="middle" font-family="'Courier New',monospace"
      font-size="18" fill="#333333" letter-spacing="2">
      BS IT Graduate  ·  Full-Stack Learner  ·  Lahore 🇵🇰
    </text>
    <rect x="200" y="185" width="500" height="44" rx="8" fill="#333333" opacity="0.04"/>
    <rect x="200" y="185" width="500" height="44" rx="8" fill="none" stroke="#FF6F61" stroke-width="1.5" opacity="0.5"/>
    <text x="230" y="213" font-family="'Courier New',monospace" font-size="14" fill="#FF6F61">$ </text>
    <text x="254" y="213" font-family="'Courier New',monospace" font-size="14" fill="#333">Building real projects every day</text>
    <rect x="620" y="200" width="3" height="18" fill="#333">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <!-- Tech tags -->
    <rect x="218" y="244" width="74" height="22" rx="4" fill="none" stroke="#FF4500" stroke-width="1.2"/>
    <text x="255" y="259" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#FF4500">React.js</text>
    <rect x="302" y="244" width="74" height="22" rx="4" fill="none" stroke="#0077B5" stroke-width="1.2"/>
    <text x="339" y="259" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#0077B5">Node.js</text>
    <rect x="386" y="244" width="74" height="22" rx="4" fill="none" stroke="#B8860B" stroke-width="1.2"/>
    <text x="423" y="259" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#B8860B">Supabase</text>
    <rect x="470" y="244" width="74" height="22" rx="4" fill="none" stroke="#00b359" stroke-width="1.2"/>
    <text x="507" y="259" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#00b359">Firebase</text>
    <rect x="554" y="244" width="90" height="22" rx="4" fill="none" stroke="#4B0082" stroke-width="1.2"/>
    <text x="599" y="259" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#4B0082">JavaScript</text>
    <!-- Bottom stripe -->
    <rect x="0" y="275" width="128" height="5" fill="#FF6F61"/>
    <rect x="128" y="275" width="129" height="5" fill="#FFD700"/>
    <rect x="257" y="275" width="129" height="5" fill="#00b359"/>
    <rect x="386" y="275" width="129" height="5" fill="#0099CC"/>
    <rect x="515" y="275" width="129" height="5" fill="#FF4081"/>
    <rect x="644" y="275" width="128" height="5" fill="#8A2BE2"/>
    <rect x="772" y="275" width="128" height="5" fill="#FF6F61"/>
  </g>
</svg>