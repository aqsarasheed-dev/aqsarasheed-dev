name: Generate GitHub Stats

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  generate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Stats SVG
        run: |
          mkdir -p assets

          curl "https://github-readme-stats.vercel.app/api?username=aqsarasheed-dev&show_icons=true&theme=transparent&hide_border=true&bg_color=0D1117&title_color=8A2BE2&icon_color=00BFFF&text_color=FFFFFF&ring_color=FFD700" \
          -o assets/stats.svg

      - name: Commit

        uses: stefanzweifel/git-auto-commit-action@v5

        with:
          commit_message: Update GitHub stats