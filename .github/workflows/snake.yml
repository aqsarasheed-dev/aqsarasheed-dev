name: Generate Snake

on:

  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:

  generate:

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:

      - name: Generate GitHub Contribution Snake

        uses: Platane/snk@v3

        with:

          github_user_name: aqsarasheed-dev

          outputs: |
            dist/github-snake.svg?palette=github-dark
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#8A2BE2&color_dots=#161B22,#1E293B,#2563EB,#7C3AED,#FF6F61

      - name: Push Snake

        uses: crazy-max/ghaction-github-pages@v4

        with:

          target_branch: output

          build_dir: dist

        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}