          stroke-width="2"/>

    <text x="70" y="52"
          text-anchor="middle"
          font-size="46">

          ⚙️

    </text>

    <text x="70"
          y="95"
          text-anchor="middle"
          font-size="15"
          fill="white"
          font-weight="bold">

          Backend

    </text>

    <text x="70"
          y="122"
          text-anchor="middle"
          font-size="12"
          fill="#AAAAAA">

          FastAPI • Flask

    </text>

  </g>

  <!-- Trophy 3 -->

  <g transform="translate(385,90)">

    <rect width="140"
          height="170"
          rx="18"
          fill="#141b28"
          stroke="#00BFFF"
          stroke-width="2"/>

    <text x="70"
          y="52"
          text-anchor="middle"
          font-size="46">

          🐍

    </text>

    <text x="70"
          y="95"
          text-anchor="middle"
          font-size="15"
          fill="white"
          font-weight="bold">

          Python

    </text>

    <text x="70"
          y="122"
          text-anchor="middle"
          font-size="12"
          fill="#AAAAAA">

          Automation

    </text>

  </g>

  <!-- Trophy 4 -->

  <g transform="translate(555,90)">

    <rect width="140"
          height="170"
          rx="18"
          fill="#141b28"
          stroke="#00FF7F"
          stroke-width="2"/>

    <text x="70"
          y="52"
          text-anchor="middle"
          font-size="46">

          🚀

    </text>

    <text x="70"
          y="95"
          text-anchor="middle"
          font-size="15"
          fill="white"
          font-weight="bold">

          Full Stack

    </text>

    <text x="70"
          y="122"
          text-anchor="middle"
          font-size="12"
          fill="#AAAAAA">

