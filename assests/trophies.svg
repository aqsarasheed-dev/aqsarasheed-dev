          stroke-width="2"/>

    <text x="70"
          y="52"
          text-anchor="middle"
          font-size="46">

          📚

    </text>

    <text x="70"
          y="95"
          text-anchor="middle"
          font-size="15"
          fill="white"
          font-weight="bold">

          Lifelong Learner

    </text>

    <text x="70"
          y="122"
          text-anchor="middle"
          font-size="12"
          fill="#AAAAAA">

          IBM • Cisco

    </text>

  </g>

  <!-- Animated glowing line -->

  <line x1="90" y1="286"
        x2="810"
        y2="286"
        stroke="url(#border)"
        stroke-width="3"
        filter="url(#glow)">

    <animate
      attributeName="stroke-dasharray"
      values="0,800;800,0;0,800"
      dur="5s"
      repeatCount="indefinite"/>

  </line>

</svg>