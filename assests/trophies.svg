<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A0A2E"/>
    </linearGradient>

    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6F61"/>
      <stop offset="25%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#00FF7F"/>
      <stop offset="75%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#8A2BE2"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <rect width="900" height="320" rx="20"
        fill="url(#bg)"
        stroke="url(#border)"
        stroke-width="3"/>

  <text
      x="450"
      y="48"
      text-anchor="middle"
      font-size="28"
      font-family="Arial"
      fill="#FFFFFF"
      font-weight="bold">

      🏆 Developer Achievements

  </text>

  <!-- Trophy 1 -->

  <g transform="translate(45,90)">

    <rect width="140" height="170" rx="18"
          fill="#141b28"
          stroke="#FF6F61"
          stroke-width="2"/>

    <text x="70" y="52" text-anchor="middle"
          font-size="46">🤖</text>

    <text x="70" y="95"
          text-anchor="middle"
          font-size="15"
          fill="#FFFFFF"
          font-weight="bold">

          AI Builder

    </text>

    <text x="70" y="122"
          text-anchor="middle"
          font-size="12"
          fill="#AAAAAA">

          LLM Projects

    </text>

  </g>

  <!-- Trophy 2 -->

  <g transform="translate(215,90)">

    <rect width="140" height="170" rx="18"
          fill="#141b28"
