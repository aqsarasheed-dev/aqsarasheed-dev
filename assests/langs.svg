<svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A0A2E"/>
    </linearGradient>

    <linearGradient id="ringPython" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD43B"/>
      <stop offset="100%" stop-color="#3776AB"/>
    </linearGradient>

    <linearGradient id="ringJS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F7DF1E"/>
      <stop offset="100%" stop-color="#F0DB4F"/>
    </linearGradient>

    <linearGradient id="ringHTML" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6F61"/>
      <stop offset="100%" stop-color="#E34F26"/>
    </linearGradient>

    <linearGradient id="ringCSS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#1572B6"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <style>

      .title{
        fill:white;
        font-size:30px;
        font-family:Arial;
        font-weight:bold;
      }

      .lang{
        fill:white;
        font-size:18px;
        font-family:Arial;
        font-weight:bold;
      }

      .percent{
        fill:#ffffff;
        font-size:20px;
        font-family:Courier New;
        font-weight:bold;
      }

    </style>

  </defs>

  <!-- Background -->

  <rect
    width="900"
    height="340"
    rx="22"
    fill="url(#bg)"
    stroke="#8A2BE2"
    stroke-width="2"/>

  <!-- Glow -->

  <circle
      cx="120"
      cy="60"
      r="70"
      fill="#8A2BE2"
      opacity=".08"
      filter="url(#glow)">
      <animate attributeName="r"
               values="70;90;70"
               dur="7s"
               repeatCount="indefinite"/>
  </circle>

  <text
      x="450"
      y="42"
      text-anchor="middle"
      class="title">

      💻 Languages & Technologies

  </text>

  <!-- ================= Python ================= -->

  <g transform="translate(100,90)">

    <circle
        cx="70"
        cy="70"
        r="52"
        fill="none"
        stroke="#263043"
        stroke-width="12"/>

    <circle
        cx="70"
        cy="70"
        r="52"
        fill="none"
        stroke="url(#ringPython)"
        stroke-width="12"
        stroke-linecap="round"
        stroke-dasharray="327"
        stroke-dashoffset="65">

      <animate
        attributeName="stroke-dashoffset"
        from="327"
        to="65"
        dur="2s"
        fill="freeze"/>

    </circle>

    <text
        x="70"
        y="77"
        text-anchor="middle"
        class="percent">

        80%

    </text>

    <text
        x="70"
        y="155"
        text-anchor="middle"
        class="lang">

        Python

    </text>

  </g>

  <!-- ================= JavaScript ================= -->

  <g transform="translate(300,90)">

    <circle cx="70" cy="70" r="52"
        fill="none"
        stroke="#263043"
        stroke-width="12"/>

    <circle
        cx="70"
        cy="70"
        r="52"
        fill="none"
        stroke="url(#ringJS)"
        stroke-width="12"
        stroke-linecap="round"
        stroke-dasharray="327"
        stroke-dashoffset="115">

      <animate
          attributeName="stroke-dashoffset"
          from="327"
          to="115"
          dur="2.2s"
          fill="freeze"/>

    </circle>

    <text x="70" y="77"
          text-anchor="middle"
          class="percent">

      65%

    </text>

    <text x="70"
          y="155"
          text-anchor="middle"
          class="lang">

      JavaScript

    </text>

  </g>

  <!-- ================= HTML ================= -->

  <g transform="translate(500,90)">

    <circle cx="70"
            cy="70"
            r="52"
            fill="none"
            stroke="#263043"
            stroke-width="12"/>

    <circle
        cx="70"
        cy="70"
        r="52"
        fill="none"
        stroke="url(#ringHTML)"
        stroke-width="12"
        stroke-linecap="round"
        stroke-dasharray="327"
        stroke-dashoffset="150">

      <animate
        attributeName="stroke-dashoffset"
        from="327"
        to="150"
        dur="2.4s"
        fill="freeze"/>

    </circle>

    <text
        x="70"
        y="77"
        text-anchor="middle"
        class="percent">

      55%

    </text>

    <text
        x="70"
        y="155"
        text-anchor="middle"
        class="lang">

      HTML

    </text>

  </g>

  <!-- ================= CSS ================= -->

  <g transform="translate(700,90)">

    <circle
        cx="70"
        cy="70"
        r="52"
        fill="none"
        stroke="#263043"
        stroke-width="12"/>

    <circle
        cx="70"
        cy="70"
        r="52"
        fill="none"
        stroke="url(#ringCSS)"
        stroke-width="12"
        stroke-linecap="round"
        stroke-dasharray="327"
        stroke-dashoffset="170">

      <animate
          attributeName="stroke-dashoffset"
          from="327"
          to="170"
          dur="2.6s"
          fill="freeze"/>

    </circle>

    <text
        x="70"
        y="77"
        text-anchor="middle"
        class="percent">

      48%

    </text>

    <text
        x="70"
        y="155"
        text-anchor="middle"
        class="lang">

      CSS

    </text>

  </g>

  <!-- Bottom Panel -->

  <rect
      x="70"
      y="285"
      width="760"
      height="34"
      rx="8"
      fill="#111827"
      stroke="#8A2BE2"/>

  <text
      x="450"
      y="307"
      text-anchor="middle"
      fill="#A8B2D1"
      font-size="15"
      font-family="Courier New">

      Python • JavaScript • HTML • CSS • React • FastAPI • Flask • Next.js

  </text>

</svg>