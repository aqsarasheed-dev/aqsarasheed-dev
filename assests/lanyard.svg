<svg width="280" height="420" viewBox="0 0 280 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A2E"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#FF6F61"/>
      <stop offset="20%"  style="stop-color:#FFD700"/>
      <stop offset="40%"  style="stop-color:#00FF7F"/>
      <stop offset="60%"  style="stop-color:#00BFFF"/>
      <stop offset="80%"  style="stop-color:#FF4081"/>
      <stop offset="100%" style="stop-color:#8A2BE2"/>
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6F61"/>
      <stop offset="100%" style="stop-color:#8A2BE2"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="30" y="60" width="220" height="330" rx="14"/>
    </clipPath>
  </defs>

  <!-- Lanyard string with swing animation -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="-4 140 0; 4 140 0; -4 140 0" dur="3s" repeatCount="indefinite"/>

    <!-- Lanyard cord -->
    <path d="M 100 0 Q 110 30 130 45 Q 140 52 150 45 Q 170 30 180 0"
      fill="none" stroke="#8A2BE2" stroke-width="3" opacity="0.7"/>

    <!-- Lanyard clip -->
    <rect x="127" y="44" width="26" height="20" rx="4" fill="#FFD700"/>
    <rect x="133" y="50" width="14" height="8" rx="2" fill="#1A0A2E"/>

    <!-- Card -->
    <g filter="url(#cardShadow)">
      <!-- Card body -->
      <rect x="30" y="62" width="220" height="330" rx="14" fill="url(#cardBg)"/>

      <!-- Card border rainbow -->
      <rect x="30" y="62" width="220" height="330" rx="14" fill="none"
        stroke="url(#stripeGrad)" stroke-width="3"/>

      <!-- Top stripe -->
      <rect x="30" y="62" width="220" height="8" rx="0" fill="url(#stripeGrad)" clip-path="url(#cardClip)"/>

      <!-- Company name area -->
      <rect x="50" y="82" width="180" height="28" rx="4" fill="#FF6F61" opacity="0.15"/>
      <text x="140" y="102" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="11" font-weight="700" fill="#FF6F61" letter-spacing="3">DEVELOPER ID</text>

      <!-- Avatar circle -->
      <circle cx="140" cy="172" r="52" fill="url(#avatarGrad)" opacity="0.2"/>
      <circle cx="140" cy="172" r="52" fill="none" stroke="url(#stripeGrad)" stroke-width="3"/>
      <!-- AR initials -->
      <text x="140" y="180" text-anchor="middle" font-family="'Arial Black',sans-serif"
        font-size="34" font-weight="900" fill="#FFFFFF" opacity="0.9">AR</text>

      <!-- Name -->
      <text x="140" y="248" text-anchor="middle" font-family="'Arial Black',sans-serif"
        font-size="20" font-weight="900" fill="#FFFFFF" letter-spacing="1">AQSA RASHEED</text>

      <!-- Role -->
      <text x="140" y="268" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="11" fill="#FF6F61" letter-spacing="2">Full-Stack Learner</text>

      <!-- Divider -->
      <line x1="60" y1="282" x2="220" y2="282" stroke="url(#stripeGrad)" stroke-width="1.5" opacity="0.6"/>

      <!-- Info rows -->
      <text x="60" y="302" font-family="'Courier New',monospace" font-size="10" fill="#8A2BE2" letter-spacing="1">UNIVERSITY</text>
      <text x="60" y="316" font-family="'Courier New',monospace" font-size="10" fill="#B0E4CC">UE Lahore · BSIT · 2025</text>

      <text x="60" y="335" font-family="'Courier New',monospace" font-size="10" fill="#FFD700" letter-spacing="1">CGPA</text>
      <text x="60" y="349" font-family="'Courier New',monospace" font-size="10" fill="#B0E4CC">3.25 / 4.0</text>

      <text x="155" y="335" font-family="'Courier New',monospace" font-size="10" fill="#00BFFF" letter-spacing="1">STATUS</text>
      <text x="155" y="349" font-family="'Courier New',monospace" font-size="10" fill="#00FF7F">Open to Work</text>

      <!-- Barcode-style decoration -->
      <rect x="80" y="362" width="3" height="18" fill="#8A2BE2" opacity="0.6"/>
      <rect x="86" y="362" width="5" height="18" fill="#FF6F61" opacity="0.6"/>
      <rect x="94" y="362" width="2" height="18" fill="#FFD700" opacity="0.6"/>
      <rect x="99" y="362" width="6" height="18" fill="#00BFFF" opacity="0.6"/>
      <rect x="108" y="362" width="3" height="18" fill="#FF4081" opacity="0.6"/>
      <rect x="114" y="362" width="4" height="18" fill="#8A2BE2" opacity="0.6"/>
      <rect x="121" y="362" width="2" height="18" fill="#FF6F61" opacity="0.6"/>
      <rect x="126" y="362" width="5" height="18" fill="#FFD700" opacity="0.6"/>
      <rect x="134" y="362" width="3" height="18" fill="#00FF7F" opacity="0.6"/>
      <rect x="140" y="362" width="6" height="18" fill="#00BFFF" opacity="0.6"/>
      <rect x="149" y="362" width="2" height="18" fill="#FF4081" opacity="0.6"/>
      <rect x="154" y="362" width="4" height="18" fill="#8A2BE2" opacity="0.6"/>
      <rect x="161" y="362" width="3" height="18" fill="#FF6F61" opacity="0.6"/>
      <rect x="167" y="362" width="5" height="18" fill="#FFD700" opacity="0.6"/>
      <rect x="175" y="362" width="2" height="18" fill="#00FF7F" opacity="0.6"/>
      <rect x="180" y="362" width="4" height="18" fill="#00BFFF" opacity="0.6"/>
      <rect x="187" y="362" width="3" height="18" fill="#8A2BE2" opacity="0.6"/>

      <text x="140" y="396" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="8" fill="#B0E4CC" opacity="0.4" letter-spacing="1">aqsarasheed-dev</text>

      <!-- Bottom stripe -->
      <rect x="30" y="384" width="220" height="8" rx="0" fill="url(#stripeGrad)" clip-path="url(#cardClip)"/>
    </g>
  </g>
</svg>